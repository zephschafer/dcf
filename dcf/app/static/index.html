<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dcf — collectors</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b67;
      --text-tertiary: #9e9e99;
      --border: rgba(0,0,0,0.1);
      --border-mid: rgba(0,0,0,0.15);

      --green-bg: #eaf3de;
      --green-text: #3b6d11;
      --green-dot: #639922;

      --blue-bg: #e6f1fb;
      --blue-text: #185fa5;
      --blue-dot: #378add;

      --red-bg: #fcebeb;
      --red-text: #a32d2d;
      --red-dot: #e24b4a;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --bg-secondary: #242422;
        --text-primary: #f0f0ec;
        --text-secondary: #a0a09a;
        --text-tertiary: #6b6b67;
        --border: rgba(255,255,255,0.08);
        --border-mid: rgba(255,255,255,0.12);

        --green-bg: #1a2e0a;
        --green-text: #97c459;
        --green-dot: #639922;

        --blue-bg: #0c1e33;
        --blue-text: #85b7eb;
        --blue-dot: #378add;

        --red-bg: #2a0f0f;
        --red-text: #f09595;
        --red-dot: #e24b4a;
      }
    }

    body {
      font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Fira Mono", monospace;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 2rem 4rem;
    }

    .header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .header-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-count { font-size: 12px; color: var(--text-tertiary); }

    /* ── rows ── */

    .pipeline-row {
      border-top: 0.5px solid var(--border);
    }

    .pipeline-row:last-child {
      border-bottom: 0.5px solid var(--border);
    }

    .pipeline-main {
      display: flex;
      align-items: center;
      padding: 1rem 0;
      cursor: pointer;
      user-select: none;
    }

    .pipeline-main:hover .pipeline-name { color: var(--blue-text); }

    .pipeline-meta {
      width: 200px;
      flex-shrink: 0;
      padding-right: 1.5rem;
    }

    .pipeline-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      transition: color 0.1s;
    }

    .pipeline-ns {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .steps {
      display: flex;
      align-items: center;
      flex: 1;
      flex-wrap: wrap;
      gap: 0;
    }

    .step-node {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }

    .step-node.done    { background: var(--green-bg); color: var(--green-text); }
    .step-node.running { background: var(--blue-bg);  color: var(--blue-text);  }
    .step-node.pending { background: var(--bg-secondary); color: var(--text-tertiary); }
    .step-node.error   { background: var(--red-bg);   color: var(--red-text);   }

    .step-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .step-dot.done    { background: var(--green-dot); }
    .step-dot.running { background: var(--blue-dot);  }
    .step-dot.pending { background: var(--text-tertiary); opacity: 0.35; }
    .step-dot.error   { background: var(--red-dot);   }

    .connector {
      height: 0.5px;
      width: 18px;
      background: var(--border-mid);
      flex-shrink: 0;
    }

    .pipeline-right {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding-left: 1.5rem;
      flex-shrink: 0;
    }

    .time-label {
      font-size: 11px;
      color: var(--text-tertiary);
      white-space: nowrap;
      min-width: 70px;
      text-align: right;
    }

    .status-text { font-size: 11px; width: 60px; text-align: right; }
    .status-text.done    { color: var(--green-text); }
    .status-text.running { color: var(--blue-text);  }
    .status-text.error   { color: var(--red-text);   }
    .status-text.pending { color: var(--text-tertiary); }

    .chevron {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-left: 0.25rem;
      transition: transform 0.18s;
      display: inline-block;
    }

    .chevron.open { transform: rotate(180deg); }

    .pulse {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--blue-dot);
      animation: pulse 1.5s ease-in-out infinite;
      margin-right: 4px;
      vertical-align: middle;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .run-btn, .cancel-btn {
      font-family: inherit;
      font-size: 11px;
      background: none;
      border: 0.5px solid var(--border-mid);
      border-radius: 3px;
      padding: 2px 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.1s, border-color 0.1s;
    }

    .run-btn { color: var(--text-tertiary); }
    .run-btn:hover { color: var(--text-secondary); border-color: var(--text-tertiary); }

    .cancel-btn { color: var(--red-text); border-color: var(--red-dot); opacity: 0.6; }
    .cancel-btn:hover { opacity: 1; }

    /* ── drawer ── */

    .drawer {
      display: none;
      border-top: 0.5px solid var(--border);
      background: var(--bg-secondary);
    }

    .drawer.open { display: block; }

    .drawer-inner {
      padding: 1rem 0 1rem 200px;
      display: flex;
      gap: 1.5rem;
    }

    .pane { flex: 1; min-width: 0; }

    .pane-label {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.5rem;
    }

    .log-box, .yaml-box {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 0.75rem 1rem;
      font-size: 11px;
      line-height: 1.7;
      max-height: 160px;
      overflow-y: auto;
    }

    .log-line { display: flex; gap: 0.75rem; }
    .log-ts   { color: var(--text-tertiary); flex-shrink: 0; }
    .log-msg  { color: var(--text-secondary); }
    .log-line.err  .log-msg { color: var(--red-text); }
    .log-line.ok   .log-msg { color: var(--green-text); }

    .yaml-box { white-space: pre; color: var(--text-secondary); }
    .y-key     { color: var(--blue-text); }
    .y-str     { color: var(--green-text); }
    .y-comment { color: var(--text-tertiary); }

    .empty-state { font-size: 12px; color: var(--text-tertiary); padding: 2rem 0; }
    .loading-msg { color: var(--text-tertiary); font-size: 11px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <span class="header-title">collectors</span>
      <span class="header-count" id="collector-count"></span>
    </div>
    <div id="pipeline-list"></div>
  </div>

  <script>
    let pipelines = [];
    let pollTimer = null;
    const detailCache = {};   // name → {log, yaml} once loaded
    const openDrawers = new Set();

    async function fetchCollectors() {
      try {
        const res = await fetch('/api/collectors');
        pipelines = await res.json();
      } catch (_) {}
      render();
      // refresh open drawers if any collector is running
      for (const name of openDrawers) {
        const p = pipelines.find(x => x.name === name);
        if (p && p.status === 'running') loadDetail(name, true);
      }
      schedulePoll();
    }

    function schedulePoll() {
      clearTimeout(pollTimer);
      const anyRunning = pipelines.some(p => p.status === 'running');
      pollTimer = setTimeout(fetchCollectors, anyRunning ? 3000 : 10000);
    }

    async function runCollector(name, e) {
      e.stopPropagation();
      try {
        await fetch('/api/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ collector: name }),
        });
      } catch (_) {}
      delete detailCache[name];
      fetchCollectors();
    }

    async function cancelRun(name, e) {
      e.stopPropagation();
      try { await fetch(`/api/run/${name}`, { method: 'DELETE' }); } catch (_) {}
      fetchCollectors();
    }

    async function loadDetail(name, force = false) {
      if (!force && detailCache[name]) {
        renderDrawer(name, detailCache[name]);
        return;
      }
      try {
        const res = await fetch(`/api/collectors/${name}/detail`);
        const data = await res.json();
        detailCache[name] = data;
        renderDrawer(name, data);
      } catch (_) {}
    }

    function renderDrawer(name, data) {
      const el = document.getElementById(`drawer-${name}`);
      if (!el) return;

      const logHtml = data.log && data.log.length
        ? data.log.map(l =>
            `<div class="log-line ${l.cls || 'info'}">
               <span class="log-ts">${l.ts}</span>
               <span class="log-msg">${l.msg}</span>
             </div>`
          ).join('')
        : '<span class="loading-msg">no logs yet</span>';

      el.querySelector('.log-box').innerHTML = logHtml;
      el.querySelector('.yaml-box').innerHTML = colorYaml(data.yaml || '');
    }

    function toggleDrawer(name) {
      const drawer = document.getElementById(`drawer-${name}`);
      const chev   = document.getElementById(`chev-${name}`);
      const isOpen = drawer.classList.toggle('open');
      chev.classList.toggle('open', isOpen);
      if (isOpen) {
        openDrawers.add(name);
        loadDetail(name);
      } else {
        openDrawers.delete(name);
      }
    }

    function colorYaml(text) {
      return text.split('\n').map(line => {
        const escaped = line
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
        if (escaped.trimStart().startsWith('#'))
          return `<span class="y-comment">${escaped}</span>`;
        return escaped.replace(/^(\s*)([\w_-]+)(:)(.*)$/, (_, indent, key, colon, rest) => {
          const val = rest.replace(
            /('[^']*'|"[^"]*"|\btrue\b|\bfalse\b|\bnull\b|-?\d+(\.\d+)?)/g,
            m => `<span class="y-str">${m}</span>`
          );
          return `${indent}<span class="y-key">${key}</span>${colon}${val}`;
        });
      }).join('\n');
    }

    function statusLabel(p) {
      if (p.status === 'done')    return '<span class="status-text done">✓ done</span>';
      if (p.status === 'error')   return '<span class="status-text error">✕ error</span>';
      if (p.status === 'running') return '<span class="status-text running"><span class="pulse"></span>running</span>';
      return '<span class="status-text pending">idle</span>';
    }

    function renderSteps(steps) {
      return steps.map((s, i) => {
        const conn = i < steps.length - 1 ? '<div class="connector"></div>' : '';
        return `<div class="step-node ${s.status}"><span class="step-dot ${s.status}"></span>${s.label}</div>${conn}`;
      }).join('');
    }

    function renderPipeline(p) {
      const isRunning = p.status === 'running';
      const actionBtn = isRunning
        ? `<button class="cancel-btn" onclick="cancelRun('${p.name}', event)">✕ cancel</button>`
        : `<button class="run-btn" onclick="runCollector('${p.name}', event)">&#9654; run</button>`;

      return `
        <div class="pipeline-row">
          <div class="pipeline-main" onclick="toggleDrawer('${p.name}')">
            <div class="pipeline-meta">
              <div class="pipeline-name">${p.name}</div>
              <div class="pipeline-ns">${p.namespace}</div>
            </div>
            <div class="steps">${renderSteps(p.steps)}</div>
            <div class="pipeline-right">
              <span class="time-label">${p.lastRan || 'never run'}</span>
              ${statusLabel(p)}
              ${actionBtn}
              <span class="chevron" id="chev-${p.name}">▾</span>
            </div>
          </div>
          <div class="drawer" id="drawer-${p.name}">
            <div class="drawer-inner">
              <div class="pane">
                <div class="pane-label">last run log</div>
                <div class="log-box"><span class="loading-msg">loading...</span></div>
              </div>
              <div class="pane">
                <div class="pane-label">config</div>
                <div class="yaml-box"></div>
              </div>
            </div>
          </div>
        </div>`;
    }

    function render() {
      const count = pipelines.length;
      document.getElementById('collector-count').textContent =
        count === 0 ? '' : `(${count})`;

      if (count === 0) {
        document.getElementById('pipeline-list').innerHTML =
          '<div class="empty-state">no collectors found in collectors/</div>';
        return;
      }

      // preserve open drawer state across re-renders
      document.getElementById('pipeline-list').innerHTML =
        pipelines.map(renderPipeline).join('');

      for (const name of openDrawers) {
        const drawer = document.getElementById(`drawer-${name}`);
        const chev   = document.getElementById(`chev-${name}`);
        if (drawer) {
          drawer.classList.add('open');
          chev.classList.add('open');
          if (detailCache[name]) renderDrawer(name, detailCache[name]);
          else loadDetail(name);
        }
      }
    }

    fetchCollectors();
  </script>
</body>
</html>
